<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DN Company ERP</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#080808;color:#fff;font-family:Arial,sans-serif}
    .wrap{max-width:900px;margin:auto;padding:16px}
    .card{background:#151515;border:1px solid #5b4510;border-radius:24px;padding:18px;margin:14px 0}
    .brand{display:flex;gap:14px;align-items:center}
    .logo{width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,#ffd84d,#b8860b);color:#000;font-weight:900;font-size:30px;display:grid;place-items:center}
    .muted{color:#aaa}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    input,select,textarea,button{width:100%;padding:14px;border-radius:14px;border:1px solid #6b5419;background:#0d0d0d;color:#fff;font-size:16px}
    button{background:linear-gradient(135deg,#ffd84d,#b8860b);color:#111;border:0;font-weight:900;margin-top:8px}
    .ghost{background:#222;color:#fff;border:1px solid #555}
    .danger{background:#4b1111;color:#ffd1d1}
    .nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .active{outline:2px solid #ffd84d}
    .hide{display:none}
    .items{display:grid;gap:10px}
    .item{background:#101010;border:1px solid #3a3218;border-radius:18px;padding:14px}
    .chip{display:inline-block;background:#2b2108;color:#ffe58a;border:1px solid #6b5419;border-radius:999px;padding:6px 10px;margin:4px;font-size:13px}
    .total{font-size:26px;color:#ffd84d;text-align:center;font-weight:900;margin:12px 0}
    @media(max-width:700px){.grid,.nav{grid-template-columns:1fr}.wrap{padding:10px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card brand">
    <div class="logo">DN</div>
    <div>
      <h1>DN Company ERP</h1>
      <p class="muted">Inventory + Sales POS</p>
    </div>
  </div>

  <div id="loginBox" class="card">
    <h2>Login</h2>
    <input id="email" value="admin@dncompany.kr" />
    <input id="password" type="password" value="DN@2026Admin" />
    <button onclick="login()">Sign In</button>
    <button class="ghost" onclick="createAdmin()">Create Default Admin First</button>
  </div>

  <div id="appBox" class="hide">
    <div class="card nav">
      <button id="dashBtn" class="active" onclick="tab('dash')">Dashboard</button>
      <button id="invBtn" onclick="tab('inv')">Inventory</button>
      <button id="posBtn" onclick="tab('pos')">Sales POS</button>
      <button onclick="logout()">Logout</button>
    </div>

    <section id="dash" class="card">
      <h2>Dashboard</h2>
      <p>Total Items: <b id="totalItems">0</b></p>
      <p>Total Stock Qty: <b id="totalQty">0</b></p>
      <p>Total Sales: <b id="totalSales">Rs 0</b></p>
    </section>

    <section id="inv" class="card hide">
      <h2>Inventory</h2>
      <div class="grid">
        <input id="brand" placeholder="Brand eg: Dell" />
        <input id="model" placeholder="Model eg: Alienware M15" />

        <select id="category">
          <option>Laptop</option><option>Desktop</option><option>Mobile</option>
          <option>Tablet</option><option>Accessories</option><option>Spare Parts</option>
        </select>

        <select id="condition">
          <option>Brand New</option><option>Recondition</option><option>Used</option>
        </select>

        <input id="cpu" placeholder="CPU" />
        <input id="ram" placeholder="RAM" />
        <input id="ssd" placeholder="SSD / Storage" />
        <input id="gpu" placeholder="GPU" />
        <input id="serial" placeholder="IMEI / Serial" />
        <input id="qty" type="number" value="1" placeholder="Qty" />

        <select id="costCurrency">
          <option>KRW</option><option>LKR</option>
        </select>
        <input id="costPrice" type="number" value="0" placeholder="Cost Price" />

        <select id="saleCurrency">
          <option>LKR</option><option>KRW</option>
        </select>
        <input id="salePrice" type="number" value="0" placeholder="Sale Price" />

        <input id="minStock" type="number" value="1" placeholder="Low stock alert" />
        <input id="warranty" value="1 Month Hardware / 3 Months Software" placeholder="Warranty" />
      </div>

      <textarea id="notes" placeholder="Notes"></textarea>

      <button id="saveItemBtn" onclick="saveItem()">Save Product</button>
      <button class="ghost hide" id="cancelEditBtn" onclick="cancelEdit()">Cancel Edit</button>

      <h3>Stock List</h3>
      <input id="search" placeholder="Search..." oninput="renderItems()" />
      <div id="items" class="items"></div>
    </section>

    <section id="pos" class="card hide">
      <h2>Sales POS</h2>
      <div class="grid">
        <input id="custName" placeholder="Customer Name" />
        <input id="custPhone" placeholder="Customer Phone" />

        <select id="posProduct" onchange="selectProduct()">
          <option value="">Select Product</option>
        </select>

        <input id="posQty" type="number" value="1" oninput="calcTotal()" />
        <input id="posPrice" type="number" value="0" oninput="calcTotal()" />
        <input id="posDiscount" type="number" value="0" oninput="calcTotal()" placeholder="Discount" />
      </div>

      <div class="total" id="posTotal">Total: Rs 0</div>
      <button onclick="saveSale()">Save Sale</button>

      <h3>Sales History</h3>
      <div id="salesList" class="items"></div>
    </section>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyBjcboA1tg4cwNlhn1jr-6fzYywE9XMIUg',
  authDomain: 'dncompany-f254d.firebaseapp.com',
  projectId: 'dncompany-f254d',
  storageBucket: 'dncompany-f254d.firebasestorage.app',
  messagingSenderId: '158888116530',
  appId: '1:158888116530:web:82d9d67b440ab051d1d72b'
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let products = [];
let sales = [];
let editId = null;

window.createAdmin = async () => {
  try {
    const u = await createUserWithEmailAndPassword(auth, 'admin@dncompany.kr', 'DN@2026Admin');
    await setDoc(doc(db, 'users', u.user.uid), {
      name: 'DN Admin',
      role: 'Admin',
      email: 'admin@dncompany.kr'
    });
    alert('Admin created');
  } catch (e) {
    alert(e.message);
  }
};

window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
    loginBox.classList.add('hide');
    appBox.classList.remove('hide');
    await loadAll();
  } catch (e) {
    alert(e.message);
  }
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

window.tab = (x) => {
  dash.classList.toggle('hide', x !== 'dash');
  inv.classList.toggle('hide', x !== 'inv');
  pos.classList.toggle('hide', x !== 'pos');
  dashBtn.classList.toggle('active', x === 'dash');
  invBtn.classList.toggle('active', x === 'inv');
  posBtn.classList.toggle('active', x === 'pos');
};

async function loadAll() {
  const pSnap = await getDocs(collection(db, 'products'));
  products = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  const sSnap = await getDocs(collection(db, 'sales'));
  sales = sSnap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));

  renderAll();
}

function productData() {
  return {
    brand: brand.value.trim(),
    model: model.value.trim(),
    category: category.value,
    condition: condition.value,
    cpu: cpu.value,
    ram: ram.value,
    ssd: ssd.value,
    gpu: gpu.value,
    serial: serial.value,
    qty: Number(qty.value || 0),
    costCurrency: costCurrency.value,
    costPrice: Number(costPrice.value || 0),
    saleCurrency: saleCurrency.value,
    salePrice: Number(salePrice.value || 0),
    minStock: Number(minStock.value || 1),
    warranty: warranty.value,
    notes: notes.value,
    updatedAt: Date.now()
  };
}

window.saveItem = async () => {
  const d = productData();

  if (!d.brand && !d.model) {
    alert('Brand හෝ Model එකක් දාන්න');
    return;
  }

  try {
    if (editId) {
      await updateDoc(doc(db, 'products', editId), d);
      editId = null;
      saveItemBtn.innerText = 'Save Product';
      cancelEditBtn.classList.add('hide');
    } else {
      await addDoc(collection(db, 'products'), { ...d, createdAt: Date.now() });
    }

    clearForm();
    await loadAll();
    alert('Product saved ✅');
  } catch (e) {
    alert(e.message);
  }
};

window.editItem = (id) => {
  const p = products.find(x => x.id === id);
  if (!p) return;

  editId = id;
  brand.value = p.brand || '';
  model.value = p.model || '';
  category.value = p.category || 'Laptop';
  condition.value = p.condition || 'Used';
  cpu.value = p.cpu || '';
  ram.value = p.ram || '';
  ssd.value = p.ssd || '';
  gpu.value = p.gpu || '';
  serial.value = p.serial || '';
  qty.value = p.qty || 1;
  costCurrency.value = p.costCurrency || 'KRW';
  costPrice.value = p.costPrice || 0;
  saleCurrency.value = p.saleCurrency || 'LKR';
  salePrice.value = p.salePrice || 0;
  minStock.value = p.minStock || 1;
  warranty.value = p.warranty || '';
  notes.value = p.notes || '';

  saveItemBtn.innerText = 'Update Product';
  cancelEditBtn.classList.remove('hide');
  scrollTo(0, 0);
};

window.cancelEdit = () => {
  editId = null;
  clearForm();
  saveItemBtn.innerText = 'Save Product';
  cancelEditBtn.classList.add('hide');
};

window.deleteItem = async (id) => {
  if (confirm('Delete?')) {
    await deleteDoc(doc(db, 'products', id));
    await loadAll();
  }
};

function clearForm() {
  brand.value = '';
  model.value = '';
  cpu.value = '';
  ram.value = '';
  ssd.value = '';
  gpu.value = '';
  serial.value = '';
  notes.value = '';
  qty.value = 1;
  costPrice.value = 0;
  salePrice.value = 0;
  minStock.value = 1;
  warranty.value = '1 Month Hardware / 3 Months Software';
}

function renderAll() {
  renderStats();
  renderItems();
  renderPosProducts();
  renderSales();
}

function renderStats() {
  totalItems.innerText = products.length;
  totalQty.innerText = products.reduce((a,p) => a + Number(p.qty || 0), 0);
  totalSales.innerText = 'Rs ' + sales.reduce((a,s) => a + Number(s.total || 0), 0).toLocaleString();
}

window.renderItems = () => {
  const q = (search.value || '').toLowerCase();
  const filtered = products.filter(p => JSON.stringify(p).toLowerCase().includes(q));

  items.innerHTML = filtered.map(p => `
    <div class="item">
      <h3>${p.brand || ''} ${p.model || ''}</h3>
      <p class="muted">${p.category || ''} • ${p.condition || ''} • ${p.serial || '-'}</p>
      <span class="chip">Qty ${p.qty || 0}</span>
      <span class="chip">Cost ${p.costCurrency || 'KRW'} ${Number(p.costPrice || 0).toLocaleString()}</span>
      <span class="chip">Sale ${p.saleCurrency || 'LKR'} ${Number(p.salePrice || 0).toLocaleString()}</span>
      <p>${p.cpu || ''} ${p.ram || ''} ${p.ssd || ''} ${p.gpu || ''}</p>
      <button onclick="editItem('${p.id}')">Edit</button>
      <button class="danger" onclick="deleteItem('${p.id}')">Delete</button>
    </div>
  `).join('');
};

function renderPosProducts() {
  posProduct.innerHTML = '<option value="">Select Product</option>' +
    products
      .filter(p => Number(p.qty) > 0)
      .map(p => `<option value="${p.id}">${p.brand || ''} ${p.model || ''} - Stock ${p.qty}</option>`)
      .join('');
}

window.selectProduct = () => {
  const p = products.find(x => x.id === posProduct.value);
  posPrice.value = p ? Number(p.salePrice || 0) : 0;
  calcTotal();
};

window.calcTotal = () => {
  const total = Math.max(
    0,
    Number(posQty.value || 0) * Number(posPrice.value || 0) - Number(posDiscount.value || 0)
  );
  posTotal.innerText = 'Total: Rs ' + total.toLocaleString();
};

window.saveSale = async () => {
  const p = products.find(x => x.id === posProduct.value);
  const q = Number(posQty.value || 0);

  if (!p || q <= 0 || q > Number(p.qty)) {
    alert('Stock / Qty check කරන්න');
    return;
  }

  const total = Math.max(
    0,
    q * Number(posPrice.value || 0) - Number(posDiscount.value || 0)
  );

  const rec = {
    invoice: 'DN-' + Date.now(),
    customer: custName.value,
    phone: custPhone.value,
    product: `${p.brand || ''} ${p.model || ''}`.trim(),
    qty: q,
    unitPrice: Number(posPrice.value || 0),
    discount: Number(posDiscount.value || 0),
    total,
    date: new Date().toLocaleString(),
    createdAt: Date.now()
  };

  await addDoc(collection(db, 'sales'), rec);
  await updateDoc(doc(db, 'products', p.id), { qty: Number(p.qty) - q });

  custName.value = '';
  custPhone.value = '';
  posProduct.value = '';
  posQty.value = 1;
  posPrice.value = 0;
  posDiscount.value = 0;

  await loadAll();
  alert('Sale saved ✅');
};

function renderSales() {
  salesList.innerHTML = sales.map(s => `
    <div class="item">
      <h3>${s.invoice}</h3>
      <p>${s.product} • Qty ${s.qty}</p>
      <p class="muted">${s.customer || 'Walk-in'} ${s.phone || ''}</p>
      <span class="chip">Rs ${Number(s.total || 0).toLocaleString()}</span>
    </div>
  `).join('');
}
</script>
</body>
</html>
